<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RentalOS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;450;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#16181d;--ink-2:#3c4150;--ink-3:#6b7280;--ink-4:#9aa1ad;
  --surface:#fff;--panel:#f6f7f9;--panel-2:#eef0f4;--line:#e3e6ec;--line-2:#d3d7e0;
  --brand:#2d44c7;--brand-ink:#1d2f96;--brand-wash:#eef1ff;
  --ok:#1f9d57;--ok-wash:#e7f6ed;--warn:#b9791b;--warn-wash:#fbf1df;
  --bad:#cc3340;--bad-wash:#fbe9eb;--pend:#7a8294;--pend-wash:#eef0f4;
  --r:10px;--r-lg:14px;--sh:0 1px 2px rgba(16,18,29,.05);--sh-lg:0 8px 30px rgba(16,18,29,.10);
  --font:"Inter",system-ui,sans-serif;--disp:"Space Grotesk",sans-serif;--mono:"JetBrains Mono",monospace;
}
*{box-sizing:border-box}html,body{margin:0;padding:0}
body{font-family:var(--font);color:var(--ink);background:var(--panel);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer}.mono{font-family:var(--mono);font-feature-settings:"tnum"}.muted{color:var(--ink-3)}
.hide{display:none!important}
.center{min-height:100vh;display:grid;place-items:center;padding:20px}
.authcard{width:380px;max-width:94vw;background:var(--surface);border:1px solid var(--line);border-radius:16px;box-shadow:var(--sh-lg);padding:28px}
.logo{position:relative;width:30px;height:30px;margin-bottom:14px}
.logo::before,.logo::after{content:"";position:absolute;width:9px;height:9px;border:2px solid var(--brand)}
.logo::before{top:0;left:0;border-right:0;border-bottom:0}.logo::after{bottom:0;right:0;border-left:0;border-top:0}
.logo i{position:absolute;inset:8px;border-radius:50%;background:var(--brand);display:block}
.authcard h1{font-family:var(--disp);font-size:22px;margin:0 0 4px}
.authcard p{color:var(--ink-3);font-size:13px;margin:0 0 20px}
label.fld{display:block;margin-bottom:14px}
label.fld span{font-size:12px;font-weight:600;color:var(--ink-2);display:block;margin-bottom:5px}
.input{border:1px solid var(--line-2);border-radius:9px;padding:10px 12px;font-family:inherit;font-size:14px;width:100%;outline:none;background:var(--surface)}
.input:focus{border-color:var(--brand)}.input.mono{font-family:var(--mono);font-size:12px}
.btn{border:1px solid var(--line-2);background:var(--surface);color:var(--ink);border-radius:9px;padding:9px 15px;font-size:13px;font-weight:550;display:inline-flex;align-items:center;gap:7px;transition:.12s}
.btn:hover{background:var(--panel)}.btn.pri{background:var(--brand);border-color:var(--brand);color:#fff}.btn.pri:hover{background:var(--brand-ink)}
.btn.sm{padding:6px 11px;font-size:12px}.btn:disabled{opacity:.55;cursor:not-allowed}.btn.block{width:100%;justify-content:center;padding:11px}
.err{background:var(--bad-wash);border:1px solid #f1c4c9;color:#9b232e;font-size:12.5px;padding:9px 12px;border-radius:9px;margin-bottom:14px}
.demohint{margin-top:16px;font-size:11.5px;color:var(--ink-4);border-top:1px solid var(--line);padding-top:12px}
.demohint code{font-family:var(--mono);color:var(--ink-2)}
.appbar{position:sticky;top:0;z-index:40;display:flex;align-items:center;gap:16px;height:56px;padding:0 18px;background:var(--surface);border-bottom:1px solid var(--line)}
.brand{display:flex;align-items:center;gap:9px;font-family:var(--disp);font-weight:700;font-size:15px}
.brand .lg{position:relative;width:22px;height:22px}
.brand .lg::before,.brand .lg::after{content:"";position:absolute;width:7px;height:7px;border:2px solid var(--brand)}
.brand .lg::before{top:0;left:0;border-right:0;border-bottom:0}.brand .lg::after{bottom:0;right:0;border-left:0;border-top:0}
.brand .lg i{position:absolute;inset:6px;border-radius:50%;background:var(--brand)}
.spacer{flex:1}
.who{display:flex;align-items:center;gap:9px}.avatar{width:30px;height:30px;border-radius:50%;background:var(--brand);color:#fff;display:grid;place-items:center;font-weight:600;font-size:12px}
.who b{font-size:13px;font-weight:600;display:block;line-height:1.1}.who span{font-size:11px;color:var(--ink-4)}
.layout{display:flex;min-height:calc(100vh - 56px)}
.side{width:210px;flex:none;background:var(--surface);border-right:1px solid var(--line);padding:12px;position:sticky;top:56px;height:calc(100vh - 56px);overflow:auto}
.grp{font-size:10.5px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--ink-4);padding:12px 10px 5px}
.nav{border:0;background:transparent;width:100%;text-align:left;display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;color:var(--ink-2);font-size:13px;font-weight:500;margin-bottom:1px}
.nav:hover{background:var(--panel)}.nav.on{background:var(--brand-wash);color:var(--brand-ink);font-weight:600}
.nav svg{flex:none}.nav.soon{color:var(--ink-4);font-weight:450}
.main{flex:1;min-width:0;padding:24px 26px 60px}
.head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:18px;flex-wrap:wrap}
.h1{font-family:var(--disp);font-size:21px;font-weight:600;margin:0}.sub{color:var(--ink-3);font-size:13px;margin:3px 0 0}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);box-shadow:var(--sh)}.card.pad{padding:18px}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:16px}
.kpi{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);padding:15px 16px;box-shadow:var(--sh)}
.kpi .lbl{font-size:12px;color:var(--ink-3);font-weight:500}.kpi .val{font-family:var(--disp);font-size:24px;font-weight:600;margin-top:7px}.kpi .val small{font-family:var(--mono);font-size:12px;color:var(--ink-4)}
table.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{text-align:left;font-weight:600;font-size:11px;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-4);padding:10px 14px;border-bottom:1px solid var(--line)}
.tbl td{padding:11px 14px;border-bottom:1px solid var(--line)}.tbl tr:last-child td{border-bottom:0}
.tbl tbody tr{transition:.08s}.tbl tbody tr:hover{background:var(--panel)}.clickable{cursor:pointer}
.chip{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:600;padding:3px 9px;border-radius:20px;white-space:nowrap}
.chip::before{content:"";width:6px;height:6px;border-radius:50%;background:currentColor}
.chip.ok{color:var(--ok);background:var(--ok-wash)}.chip.warn{color:var(--warn);background:var(--warn-wash)}.chip.bad{color:var(--bad);background:var(--bad-wash)}
.chip.pend{color:var(--pend);background:var(--pend-wash)}.chip.brand{color:var(--brand-ink);background:var(--brand-wash)}.chip.plain::before{display:none}
.tierbadge{font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:6px}.tier-vip{background:#f3e8ff;color:#6b21a8}.tier-premium{background:#fff4e0;color:#92600c}.tier-normal{background:var(--panel-2);color:var(--ink-2)}
.split{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px}
.fact{background:var(--panel);border-radius:10px;padding:11px 13px}.fact .k{font-size:11px;color:var(--ink-4)}.fact .v{font-family:var(--disp);font-size:16px;font-weight:600;margin-top:2px}.fact .v.mono{font-family:var(--mono);font-size:14px}
.empty{text-align:center;padding:46px 20px;color:var(--ink-4)}
.spin{width:22px;height:22px;border:2.5px solid var(--line-2);border-top-color:var(--brand);border-radius:50%;animation:sp .7s linear infinite;margin:40px auto}
@keyframes sp{to{transform:rotate(360deg)}}
.bg{position:fixed;inset:0;background:rgba(16,18,29,.4);z-index:60;display:none}.bg.show{display:block}
.drawer{position:fixed;top:0;right:0;bottom:0;width:500px;max-width:94vw;background:var(--surface);z-index:61;transform:translateX(100%);transition:.22s;overflow:auto;box-shadow:var(--sh-lg)}
.drawer.show{transform:none}
.dh{position:sticky;top:0;background:var(--surface);border-bottom:1px solid var(--line);padding:16px 20px;display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
.db{padding:18px 20px}.x{border:0;background:var(--panel);width:30px;height:30px;border-radius:8px;color:var(--ink-3);font-size:16px}
.modal{position:fixed;top:50%;left:50%;transform:translate(-50%,-46%);width:560px;max-width:94vw;max-height:88vh;overflow:auto;background:var(--surface);border-radius:16px;box-shadow:var(--sh-lg);z-index:61;opacity:0;pointer-events:none;transition:.18s}
.modal.show{opacity:1;pointer-events:auto;transform:translate(-50%,-50%)}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;font-size:13px;font-weight:500;padding:11px 18px;border-radius:10px;box-shadow:var(--sh-lg);opacity:0;transition:.2s;z-index:80;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}.toast.bad{background:var(--bad)}
.pickrow{display:flex;align-items:center;gap:10px;padding:9px 12px;border:1px solid var(--line);border-radius:9px;margin-bottom:7px;cursor:pointer}
.pickrow.on{border-color:var(--brand);background:var(--brand-wash)}.pickrow input{accent-color:var(--brand)}
.viewer{position:relative;background:#0e1320;border-radius:14px;overflow:hidden;aspect-ratio:16/10;display:grid;place-items:center}
.viewer .feed{position:absolute;inset:0;background:radial-gradient(120% 90% at 50% 40%,#1b2436 0%,#0c111c 70%)}
.frame{position:relative;width:46%;aspect-ratio:1}
.frame span{position:absolute;width:24px;height:24px;border:3px solid rgba(255,255,255,.85)}
.frame span:nth-child(1){top:0;left:0;border-right:0;border-bottom:0}.frame span:nth-child(2){top:0;right:0;border-left:0;border-bottom:0}
.frame span:nth-child(3){bottom:0;left:0;border-right:0;border-top:0}.frame span:nth-child(4){bottom:0;right:0;border-left:0;border-top:0}
.scanline{position:absolute;left:8%;right:8%;height:2px;background:linear-gradient(90deg,transparent,#5cf2a6,transparent);box-shadow:0 0 12px #5cf2a6;animation:scl 2.4s ease-in-out infinite}
@keyframes scl{0%,100%{top:18%}50%{top:80%}}
.scanmsg{position:absolute;top:10px;left:10px;right:10px;border-radius:8px;padding:8px 11px;font-size:12.5px;font-weight:600;display:none;align-items:center;gap:8px;color:#fff}
.scanmsg.show{display:flex}.scanmsg.good{background:rgba(31,157,87,.94)}.scanmsg.err{background:rgba(204,51,64,.95)}
.slot{display:flex;align-items:center;gap:11px;padding:10px 14px;border-bottom:1px solid var(--line)}.slot:last-child{border-bottom:0}
.slot .box{width:22px;height:22px;border-radius:6px;border:2px solid var(--line-2);flex:none;display:grid;place-items:center;color:#fff;font-size:13px}
.slot.done .box{background:var(--ok);border-color:var(--ok)}.slot .qty{margin-left:auto;font-family:var(--mono);font-size:12px;color:var(--ink-3)}.slot.done .qty{color:var(--ok);font-weight:600}
.dispgrid{display:grid;grid-template-columns:minmax(0,1fr) 340px;gap:18px}
.trustgrid{display:grid;grid-template-columns:1fr 2fr;gap:16px}
.seg{display:inline-flex;background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:2px;gap:2px;flex-wrap:wrap}
.seg button{border:0;background:transparent;font-size:11.5px;font-weight:550;color:var(--ink-3);padding:5px 9px;border-radius:6px}
.seg button.on{background:var(--surface);box-shadow:var(--sh);color:var(--ink)}
.seg button.on[data-sev="warn"]{color:var(--warn)}.seg button.on[data-sev="bad"]{color:var(--bad)}
.steps{display:flex;align-items:center;flex-wrap:wrap;margin:2px 0}
.step{display:flex;align-items:center;gap:7px;font-size:11.5px}
.step .dot{width:20px;height:20px;border-radius:50%;border:2px solid var(--line-2);background:var(--surface);display:grid;place-items:center;font-size:10px;font-weight:700;color:var(--ink-4)}
.step.done .dot{background:var(--ok);border-color:var(--ok);color:#fff}.step.now .dot{background:var(--brand);border-color:var(--brand);color:#fff}
.step .nm{font-weight:550;color:var(--ink-3)}.step.done .nm,.step.now .nm{color:var(--ink)}
.step .bar{width:18px;height:2px;background:var(--line-2);margin:0 3px}.step.done .bar{background:var(--ok)}
@media(max-width:1000px){.kpis{grid-template-columns:repeat(2,1fr)}.dispgrid{grid-template-columns:1fr}.trustgrid{grid-template-columns:1fr}}
@media(max-width:680px){.kpis{grid-template-columns:1fr}.side{display:none}.main{padding:18px 14px 50px}}
</style>
</head>
<body>

<div id="configScreen" class="center hide">
  <div class="authcard">
    <div class="logo"><i></i></div>
    <h1>One-time setup</h1>
    <p>Paste your deployed Apps Script Web App URL (ends in <code>/exec</code>).</p>
    <label class="fld"><span>Web App URL</span><input id="apiInput" class="input mono" placeholder="https://script.google.com/macros/s/…/exec"></label>
    <button class="btn pri block" onclick="saveApi()">Save &amp; continue</button>
  </div>
</div>

<div id="loginScreen" class="center hide">
  <div class="authcard">
    <div class="logo"><i></i></div>
    <h1>RentalOS</h1>
    <p>Sign in to your rental operating system.</p>
    <div id="loginErr" class="err hide"></div>
    <label class="fld"><span>Email</span><input id="email" class="input" type="email" autocomplete="username" placeholder="you@dslrswala.com"></label>
    <label class="fld"><span>Password</span><input id="password" class="input" type="password" autocomplete="current-password" placeholder="••••••••"></label>
    <button class="btn pri block" id="loginBtn" onclick="doLogin()">Sign in</button>
    <div class="demohint">Demo &nbsp;·&nbsp; <code>admin@dslrswala.com / admin123</code> &nbsp; <code>staff@dslrswala.com / staff123</code><br><span style="color:var(--ink-4)">Set via <code>seedCredentials()</code> in Apps Script.</span></div>
  </div>
</div>

<div id="app" class="hide">
  <div class="appbar">
    <div class="brand"><span class="lg"><i></i></span> RentalOS</div>
    <div class="spacer"></div>
    <button class="btn sm" onclick="reloadData()">↻ Refresh</button>
    <div class="who"><div class="avatar" id="avatar">A</div><div><b id="whoName">—</b><span id="whoRole">—</span></div></div>
    <button class="btn sm" onclick="logout()">Sign out</button>
  </div>
  <div class="layout"><aside class="side" id="side"></aside><main class="main" id="main"></main></div>
</div>

<div class="bg" id="bg" onclick="closeOverlays()"></div>
<div class="drawer" id="drawer"></div>
<div class="modal" id="modal"></div>
<div class="toast" id="toast"></div>

<script>
let API_URL = localStorage.getItem('rentalos_api') || '';
let SESSION = JSON.parse(localStorage.getItem('rentalos_session') || 'null');
let CACHE = null, VIEW = 'dashboard';
const $ = s => document.querySelector(s);

async function api(action, payload){
  if(!API_URL) throw new Error('API URL not configured');
  const body = JSON.stringify(Object.assign({action, token: SESSION && SESSION.token}, payload||{}));
  const res = await fetch(API_URL, {method:'POST', headers:{'Content-Type':'text/plain;charset=utf-8'}, body, redirect:'follow'});
  const text = await res.text();
  let json; try{ json = JSON.parse(text); }catch(e){ throw new Error('Unexpected response — check the Web App URL & deployment access.'); }
  if(!json.ok) throw new Error(json.error || 'Request failed');
  return json.data;
}

const inr = n => "₹" + Number(n||0).toLocaleString("en-IN");
function toast(m, bad){ const t=$("#toast"); t.textContent=m; t.className="toast show"+(bad?" bad":""); clearTimeout(window._t); window._t=setTimeout(()=>t.classList.remove("show"),2400); }
const fmtDate = v => !v ? "—" : (String(v).indexOf("T")>=0 ? String(v).slice(0,10) : String(v));
const tier = t => `<span class="tierbadge tier-${t||'normal'}">${(t||'normal').toUpperCase()}</span>`;
const truthy = v => v===true || v==="TRUE" || v==="true";
function stageChip(s){const m={draft:["pend","Draft"],quote:["pend","Quote"],confirmed:["brand","Confirmed"],dispatched:["brand","Dispatched"],open:["warn","Open"],finalised:["ok","Finalised"],tax_invoice:["ok","Tax invoice"],paid:["ok","Paid"],closed:["pend","Closed"],cancelled:["bad","Cancelled"]};const a=m[s]||["pend",s||"—"];return `<span class="chip ${a[0]}">${a[1]}</span>`;}
const assetName = id => { const a=(CACHE&&CACHE.assets||[]).find(x=>x.id===id); return a?a.name:id; };
const clientName = id => { const c=(CACHE&&CACHE.clients||[]).find(x=>x.id===id); return c?c.name:id; };

function boot(){
  if(!API_URL){ show('configScreen'); return; }
  if(!SESSION){ show('loginScreen'); return; }
  startApp();
}
function show(id){ ["configScreen","loginScreen","app"].forEach(s=>$("#"+s).classList.toggle("hide", s!==id)); }
function saveApi(){
  const v=$("#apiInput").value.trim();
  if(!/\/exec$/.test(v)){ toast("URL should end in /exec", true); return; }
  API_URL=v; localStorage.setItem('rentalos_api', v); boot();
}
async function doLogin(){
  const email=$("#email").value.trim(), password=$("#password").value;
  const btn=$("#loginBtn"), err=$("#loginErr");
  err.classList.add("hide"); btn.disabled=true; btn.textContent="Signing in…";
  try{
    const data = await api('login', {email, password});
    SESSION = {token:data.token, user:data.user};
    localStorage.setItem('rentalos_session', JSON.stringify(SESSION));
    startApp();
  }catch(e){ err.textContent=e.message; err.classList.remove("hide"); }
  finally{ btn.disabled=false; btn.textContent="Sign in"; }
}
function logout(){ try{ api('logout',{}); }catch(e){} SESSION=null; localStorage.removeItem('rentalos_session'); CACHE=null; show('loginScreen'); }

function startApp(){
  show('app');
  const u=SESSION.user;
  $("#whoName").textContent=u.name; $("#whoRole").textContent=u.role[0].toUpperCase()+u.role.slice(1);
  $("#avatar").textContent=(u.name||"?")[0].toUpperCase();
  if(u.role==='client' || u.role==='investor'){ renderSideClient(); VIEW='portalsoon'; render(); return; }
  renderSide(); reloadData();
}
async function reloadData(){
  $("#main").innerHTML='<div class="spin"></div>';
  try{ CACHE = await api('bootstrap', {}); render(); }
  catch(e){ $("#main").innerHTML=`<div class="empty">Couldn't load data.<br><span class="mono" style="font-size:12px">${e.message}</span><br><br><button class="btn" onclick="reloadData()">Retry</button></div>`; }
}

const ICONS={dashboard:'<rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>',
  bookings:'<rect x="3" y="4" width="18" height="17" rx="2"/><path d="M3 9h18M8 2v4M16 2v4"/>',
  inventory:'<path d="M21 8l-9-5-9 5 9 5 9-5zM3 8v8l9 5 9-5V8"/>',
  clients:'<circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/>',
  scan:'<path d="M4 7V5a1 1 0 0 1 1-1h2M20 7V5a1 1 0 0 0-1-1h-2M4 17v2a1 1 0 0 0 1 1h2M20 17v2a1 1 0 0 1-1 1h-2M7 12h10"/>',
  returns:'<path d="M9 14l-4-4 4-4"/><path d="M5 10h8a5 5 0 0 1 5 5v2"/>',
  invoices:'<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6M9 13h6M9 17h4"/>',
  trust:'<path d="M12 3l8 3v6c0 5-3.5 8-8 9-4.5-1-8-4-8-9V6z"/><path d="M9 12l2 2 4-4"/>',
  deposits:'<ellipse cx="12" cy="6" rx="8" ry="3"/><path d="M4 6v6c0 1.7 3.6 3 8 3s8-1.3 8-3V6M4 12v6c0 1.7 3.6 3 8 3s8-1.3 8-3v-6"/>',
  maintenance:'<path d="M14.7 6.3a4 4 0 0 1-5.4 5.4L4 17v3h3l5.3-5.3a4 4 0 0 0 5.4-5.4l-2.3 2.3-2-2 2.3-2.3z"/>',
  soon:'<circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/>'};
const LIVE=[["dashboard","Dashboard"],["bookings","Bookings"],["scan","Scan & dispatch"],["returns","Returns"],["invoices","Invoices"],["deposits","Deposits"],["inventory","Inventory"],["maintenance","Maintenance"],["clients","Clients"],["trust","Trust & guardrails"]];
const SOON=["Investors","Analytics","Offers","Notifications","Stock audit","Settings"];
function navBtn(k,label,ic,soon){return `<button class="nav ${k===VIEW?'on':''} ${soon?'soon':''}" onclick="${soon?`toast('${label} comes online once its backend lands')`:`go('${k}')`}">
  <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">${ic}</svg>${label}</button>`;}
function renderSide(){
  let h=`<div class="grp">Live</div>`+LIVE.map(p=>navBtn(p[0],p[1],ICONS[p[0]])).join("");
  h+=`<div class="grp">Coming online</div>`+SOON.map(l=>navBtn('',l,ICONS.soon,true)).join("");

VIEWS.scan=()=>{

};
function dispatchUI(){
  const d=DISPATCH, total=d.items.length;
  const got=d.items.filter(i=>d.scanned[i.item_id]).length, complete=got===total && total>0;
  return `<div class="head"><div><h1 class="h1">Dispatch · ${d.booking_number}</h1><p class="sub">${d.client_name} · scan every item to enable OTP</p></div>
    <button class="btn sm" onclick="exitDispatch()">← Back</button></div>
  <div class="dispgrid">
    <div>
      <div class="viewer"><div class="feed"></div><div class="scanmsg" id="scanmsg"></div>
        <div class="frame"><span></span><span></span><span></span><span></span><div class="scanline"></div></div></div>
      <div style="display:flex;gap:8px;margin-top:12px">
        <input class="input" id="qrIn" placeholder="Scan or type a QR code, then Enter" onkeydown="if(event.key==='Enter'){scanQr(this.value);this.value='';}">
        <button class="btn" onclick="var i=document.getElementById('qrIn');scanQr(i.value);i.value='';i.focus();">Scan</button></div>
      <p class="muted" style="font-size:11.5px;margin:8px 0 0">No live camera here yet — type/paste a QR or use a Simulate button. Live camera is a drop-in later.</p>
    </div>
    <div class="card">
      <div style="padding:13px 14px;border-bottom:1px solid var(--line)"><b style="font-family:var(--disp)">Checklist</b>
        <div class="muted" style="font-size:12px;margin-top:2px">${got} of ${total} scanned</div></div>
      ${d.items.map(it=>{const done=!!d.scanned[it.item_id];
        return `<div class="slot ${done?'done':''}"><div class="box">${done?'✓':''}</div>
          <div><div style="font-weight:550;font-size:13px">${it.name}</div><div class="mono muted" style="font-size:11px">${it.qr_code||'no QR'}</div></div>
          ${done?'<span class="qty">in</span>':`<button class="btn sm" style="margin-left:auto" onclick="scanQr('${it.qr_code}')">Simulate</button>`}</div>`;}).join("")}
      <div style="padding:13px 14px">
        ${!d.otp_sent
          ? `<button class="btn pri block" ${complete?'':'disabled'} onclick="doSendOtp()">Send dispatch OTP</button>
             <p class="muted" style="font-size:11px;margin:8px 0 0;text-align:center">${complete?'Kit complete':'Scan all items to enable'}</p>`
          : `<div style="font-size:12px;color:var(--ok);font-weight:600;margin-bottom:8px">OTP logged for ${d.account_phone||'account holder'}</div>
             ${d.dev_otp?`<div class="muted" style="font-size:11px;margin-bottom:8px">Dev OTP (logged-only): <span class="mono" style="color:var(--ink)">${d.dev_otp}</span></div>`:''}
             <input class="input mono" id="otpIn" placeholder="Enter OTP" value="${d.dev_otp||''}" style="margin-bottom:8px">
             <button class="btn pri block" onclick="doConfirmDispatch()">Confirm &amp; dispatch</button>`}
      </div>
    </div>
  </div>`;
}
async function startDispatch(id){
  try{ const s=await api('dispatch_session',{booking_id:id});
    DISPATCH=Object.assign({scanned:{}, otp_sent:false, dev_otp:''}, s); VIEW='scan'; renderSide(); render();
    setTimeout(()=>{const i=$("#qrIn"); if(i)i.focus();},50);
  }catch(e){ toast(e.message,true); }
}
function exitDispatch(){ DISPATCH=null; render(); }
function flashScan(type,msg){ const el=$("#scanmsg"); if(!el)return; el.className="scanmsg show "+type; el.innerHTML=msg; clearTimeout(window._fs); window._fs=setTimeout(()=>el.classList.remove("show"),2000); }
function scanQr(qr){
  qr=String(qr||'').trim(); if(!qr)return;
  const it=DISPATCH.items.find(i=>i.qr_code && i.qr_code.toLowerCase()===qr.toLowerCase());
  if(!it){ flashScan('err','Not part of this booking: '+qr); return; }
  if(DISPATCH.scanned[it.item_id]){ flashScan('err',it.name+' already scanned'); return; }
  DISPATCH.scanned[it.item_id]=true; render(); flashScan('good','✓ '+it.name);
  const i=$("#qrIn"); if(i)i.focus();
}
async function doSendOtp(){
  try{ const r=await api('dispatch_send_otp',{booking_id:DISPATCH.booking_id});
    DISPATCH.otp_sent=true; DISPATCH.dev_otp=r.dev_otp||''; render(); toast('OTP logged for '+(r.sent_to||'account holder')); }
  catch(e){ toast(e.message,true); }
}
async function doConfirmDispatch(){
  const code=($("#otpIn")||{}).value||'';
  try{ const r=await api('dispatch_confirm',{booking_id:DISPATCH.booking_id, code:code, confirmed_by:DISPATCH.account_phone});
    toast(r.items_dispatched+' item(s) dispatched'); DISPATCH=null; await reloadData(); }
  catch(e){ toast(e.message,true); }
}

/* ===================== RETURNS ===================== */
let RETURN=null;
const TERM_LBL={returned:["ok","Returned"],returned_with_damage:["warn","Returned · damage"],
  not_returned_chargeable:["bad","Not returned"],not_returned_non_chargeable:["pend","Not returned · ₹0"],missing:["bad","Missing"]};
const CONDS=[["good","Good",""],["minor","Minor","warn"],["major","Major","bad"],["non_functional","Non-func","bad"]];

VIEWS.returns=()=>{
  if(RETURN) return returnUI();
  const out=CACHE.bookings.filter(b=>['dispatched','open'].indexOf(b.status)>=0);
  return `<div class="head"><div><h1 class="h1">Returns</h1><p class="sub">${out.length} booking${out.length===1?'':'s'} out · partial returns supported</p></div></div>

    ${out.map(b=>`<tr><td class="mono">${b.booking_number||b.id.slice(0,8)}</td><td>${clientName(b.client_id)} ${tier(b.tier_at_booking)}</td>
      <td>${stageChip(b.status)}</td><td class="muted">${fmtDate(b.start_date)}–${fmtDate(b.end_date)}</td>

    </tbody></table>`:'<div class="empty">Nothing out right now. Dispatch a booking first.</div>'}</div>`;
};
function returnUI(){
  const d=RETURN;
  const open=d.items.filter(i=>!i.terminal);
  const checked=open.filter(i=>(d.lines[i.item_id]||{}).checked).length;
  return `<div class="head"><div><h1 class="h1">Returns · ${d.booking_number}</h1><p class="sub">${d.client_name} · ${open.length} still out · select what's coming back</p></div>
    <button class="btn sm" onclick="exitReturn()">← Back</button></div>
  <div class="card" style="max-width:700px">
    ${d.items.map(it=>{
      if(it.terminal){ const m=TERM_LBL[it.status]||["pend",it.status];
        return `<div style="display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid var(--line);opacity:.65"><div style="flex:1"><b style="font-size:13px">${it.name}</b></div><span class="chip ${m[0]}">${m[1]}</span></div>`;}
      const st=d.lines[it.item_id]||{}, cond=st.condition||'good', isChk=!!st.checked, dmg=cond!=='good';
      return `<div style="padding:12px 14px;border-bottom:1px solid var(--line)">
        <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
          <input type="checkbox" ${isChk?'checked':''} onchange="toggleRet('${it.item_id}',this.checked)" style="accent-color:var(--brand)">
          <div style="flex:1;min-width:120px"><b style="font-size:13px">${it.name}</b> <span class="mono muted" style="font-size:11px">${it.qr_code||''}</span></div>
          <div class="seg">${CONDS.map(c=>`<button data-sev="${c[2]}" class="${cond===c[0]?'on':''}" onclick="setCond('${it.item_id}','${c[0]}')">${c[1]}</button>`).join("")}</div></div>
        ${dmg&&isChk?`<div style="margin-top:10px;display:flex;gap:8px;flex-wrap:wrap">
          <input class="input" id="cost-${it.item_id}" style="max-width:160px" inputmode="numeric" placeholder="Repair cost ₹" value="${st.cost||''}" oninput="setField('${it.item_id}','cost',this.value)">
          <input class="input" id="desc-${it.item_id}" style="flex:1;min-width:180px" placeholder="Damage description" value="${st.desc||''}" oninput="setField('${it.item_id}','desc',this.value)"></div>`:''}
      </div>`;}).join("")}
    <div style="padding:14px">
      ${!d.otp_sent
        ? `<button class="btn pri block" ${checked?'':'disabled'} onclick="doSendReturnOtp()">Send return OTP (${checked} item${checked===1?'':'s'})</button>
           <p class="muted" style="font-size:11px;margin:8px 0 0;text-align:center">${checked?'Damaged items log a repair cost; money recovery comes later':'Select at least one item'}</p>`
        : `<div style="font-size:12px;color:var(--ok);font-weight:600;margin-bottom:8px">Return OTP logged for ${d.account_phone||'account holder'}</div>
           ${d.dev_otp?`<div class="muted" style="font-size:11px;margin-bottom:8px">Dev OTP: <span class="mono" style="color:var(--ink)">${d.dev_otp}</span></div>`:''}
           <input class="input mono" id="otpIn" placeholder="Enter OTP" value="${d.dev_otp||''}" style="margin-bottom:8px">
           <button class="btn pri block" onclick="doConfirmReturn()">Confirm return</button>`}
    </div>
  </div>`;
}
async function startReturn(id){
  try{ const s=await api('return_session',{booking_id:id});
    RETURN=Object.assign({lines:{}, otp_sent:false, dev_otp:''}, s); VIEW='returns'; renderSide(); render(); }
  catch(e){ toast(e.message,true); }
}
function exitReturn(){ RETURN=null; render(); }
function toggleRet(id,on){ const st=RETURN.lines[id]||{condition:'good'}; st.checked=on; RETURN.lines[id]=st; render(); }
function setCond(id,cond){ const st=RETURN.lines[id]||{}; st.condition=cond; st.checked=true; RETURN.lines[id]=st; render(); }
function setField(id,k,v){ const st=RETURN.lines[id]||{condition:'good',checked:true}; st[k]=v; RETURN.lines[id]=st; }
async function doSendReturnOtp(){
  try{ const r=await api('return_send_otp',{booking_id:RETURN.booking_id});
    RETURN.otp_sent=true; RETURN.dev_otp=r.dev_otp||''; render(); toast('Return OTP logged'); }
  catch(e){ toast(e.message,true); }
}
async function doConfirmReturn(){
  const code=($("#otpIn")||{}).value||'', lines=[];
  RETURN.items.filter(i=>!i.terminal).forEach(function(it){
    const st=RETURN.lines[it.item_id]; if(!st||!st.checked)return;
    const cond=st.condition||'good', line={item_id:it.item_id, condition:cond};
    if(cond!=='good'){ line.repair_cost=Number(st.cost||0); line.damage_description=st.desc||''; line.damage_category=cond; }
    lines.push(line);
  });
  if(!lines.length){ toast('Select at least one item',true); return; }
  try{ const r=await api('return_confirm',{booking_id:RETURN.booking_id, code:code, lines:lines, confirmed_by:RETURN.account_phone});
    toast(r.resolved+' returned'+(r.all_terminal?' · booking finalised':' · booking still open')); RETURN=null; await reloadData(); }
  catch(e){ toast(e.message,true); }
}

function parseJson(x){ if(!x)return[]; if(typeof x==='object')return x; try{return JSON.parse(x)}catch(e){return[]} }

function openInvoice(id){ const v=(CACHE.invoices||[]).find(x=>x.id===id); if(v)invoiceDrawer(v); }
async function openInvoiceForBooking(id){
  try{ const v=await api('invoice',{booking_id:id});

    if(i>=0)CACHE.invoices[i]=v; else CACHE.invoices.push(v); invoiceDrawer(v);
  }catch(e){ toast(e.message,true); }
}
function invoiceDrawer(v){
  const stages=[["quote","Quote"],["confirmed","Confirmed"],["dispatched","Dispatched"],["open","Open"],["finalised","Finalised"],["tax_invoice","Tax invoice"],["paid","Paid"],["closed","Closed"]];
  let idx=stages.findIndex(s=>s[0]===v.status); if(idx<0)idx=3;
  const bk=CACHE.bookings.find(b=>b.id===v.booking_id)||{}, lines=parseJson(v.line_items_json);
  let linesHtml='';
  if(v.type==='consolidated'){
    linesHtml=lines.map(g=>`<div style="padding:7px 0;border-bottom:1px solid var(--line)"><div class="mono muted" style="font-size:11px">${g.booking}</div>
      ${(g.lines||[]).filter(l=>l.amount>0).map(l=>`<div style="display:flex;justify-content:space-between;font-size:12.5px"><span>${l.name} · ${l.days}d</span><span class="mono">${inr(l.amount)}</span></div>`).join("")}</div>`).join("");
  } else {
    linesHtml=lines.map(l=>`<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--line);font-size:13px;${l.chargeable?'':'opacity:.5'}">
      <span>${l.name} <span class="muted">${l.rate?'· '+inr(l.rate)+'×'+l.days+'d':''}</span>${l.chargeable?'':' <span class="chip pend plain">₹0</span>'}</span><span class="mono">${inr(l.amount)}</span></div>`).join("");
  }
  $("#drawer").innerHTML=`<div class="dh"><div><div class="mono muted" style="font-size:12px">${v.type==='consolidated'?'CONSOLIDATED · '+fmtDate(v.period_start)+'–'+fmtDate(v.period_end):(bk.booking_number||v.id.slice(0,8))}</div>
    <b style="font-family:var(--disp);font-size:17px">${clientName(v.client_id)}</b> ${v.type==='consolidated'?'<span class="chip brand plain">VIP</span>':''}</div>
    <button class="x" onclick="closeOverlays()">✕</button></div>
  <div class="db">
    <div style="overflow-x:auto;margin-bottom:16px"><div class="steps">${stages.map((s,i)=>`<div class="step ${i<idx?'done':i===idx?'now':''}"><span class="dot">${i<idx?'✓':i+1}</span><span class="nm">${s[1]}</span></div>${i<stages.length-1?'<span class="bar"></span>':''}`).join("")}</div></div>
    <p style="font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-4);margin:0 0 6px">Line items</p>
    <div class="card pad" style="padding:12px 14px;margin-bottom:14px">${linesHtml||'<div class="muted" style="font-size:12px">No chargeable lines</div>'}</div>
    <div class="split">
      <div class="fact"><div class="k">Subtotal</div><div class="v mono">${inr(v.subtotal)}</div></div>
      <div class="fact"><div class="k">Discount</div><div class="v mono">${inr(v.discount)}</div></div>
      <div class="fact"><div class="k">GST 18%</div><div class="v mono">${inr(v.gst)}</div></div>
      <div class="fact"><div class="k">Total</div><div class="v mono">${inr(v.total)}</div></div>
      ${Number(v.tds_amount)?`<div class="fact"><div class="k">TDS 2%</div><div class="v mono" style="color:var(--bad)">– ${inr(v.tds_amount)}</div></div>`:''}
      <div class="fact"><div class="k">Net payable</div><div class="v mono" style="color:var(--brand-ink)">${inr(v.net_payable)}</div></div></div>
    ${paymentBlock(v)}

/* ===================== PAYMENTS ===================== */
function paymentBlock(v){
  const net=Number(v.net_payable||0), paid=Number(v.paid_amount||0), bal=Math.max(0,net-paid);
  const pays=(CACHE.payments||[]).filter(p=>p.invoice_id===v.id || (v.booking_id && p.booking_id===v.booking_id && !p.invoice_id));
  const pct=net>0?Math.min(100,Math.round(paid/net*100)):0;
  return `<div style="margin-top:16px">
    <p style="font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-4);margin:0 0 8px">Payment</p>
    <div style="display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:5px"><span class="muted">Paid ${inr(paid)} of ${inr(net)}</span><b class="mono" style="color:${bal>0?'var(--bad)':'var(--ok)'}">${bal>0?inr(bal)+' due':'Settled'}</b></div>
    <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${bal>0?'var(--warn)':'var(--ok)'}"></div></div>
    ${pays.length?`<div style="margin-top:10px">${pays.map(p=>`<div style="display:flex;justify-content:space-between;font-size:12px;padding:5px 0;border-bottom:1px solid var(--line)"><span>${p.type} · ${p.method}${p.notes?' <span class="muted">· '+p.notes+'</span>':''}</span><span class="mono">${inr(p.amount)}</span></div>`).join("")}</div>`:''}
    ${bal>0 && ['open','finalised','tax_invoice'].indexOf(v.status)>=0?`<button class="btn block" style="margin-top:12px" onclick="paymentModal('${v.id}','${v.booking_id||''}','${v.client_id||''}',${bal})">Record payment</button>`:''}
    ${v.status==='paid'?`<button class="btn pri block" style="margin-top:12px" onclick="closeInv('${v.id}')">Mark closed</button>`:''}
  </div>`;
}
function paymentModal(invId, bookingId, clientId, suggested){
  $("#modal").innerHTML=`<div class="dh"><b style="font-family:var(--disp);font-size:17px">Record payment</b><button class="x" onclick="closeOverlays()">✕</button></div>
  <div class="db">
    <label class="fld"><span>Amount ₹</span><input id="pAmt" class="input mono" inputmode="numeric" value="${suggested||''}"></label>
    <div style="display:flex;gap:10px">
      <label class="fld" style="flex:1"><span>Type</span><select id="pType" class="input"><option value="balance">Balance</option><option value="advance">Advance</option><option value="damage_recovery">Damage recovery</option></select></label>
      <label class="fld" style="flex:1"><span>Method</span><select id="pMethod" class="input"><option value="upi">UPI</option><option value="cash">Cash</option><option value="neft">NEFT</option><option value="cheque">Cheque</option><option value="razorpay">Razorpay</option><option value="cashfree">Cashfree</option></select></label>
    </div>
    <label class="fld"><span>Notes (UPI ref, etc.)</span><input id="pNotes" class="input" placeholder="optional"></label>

async function submitPayment(invId, bookingId, clientId){
  const amt=Number(($("#pAmt")||{}).value||0);

  const btn=$("#pBtn"); btn.disabled=true; btn.textContent='Recording…';

async function closeInv(id){ try{ await api('invoice_close',{invoice_id:id}); toast('Invoice closed'); await reloadData(); openInvoice(id);}catch(e){toast(e.message,true);} }

const LEVEL_CARDS=[["New","< 5 pts","1 item · 3 days"],["Building","5–19 pts","2 items · 5 days"],["Established","20–49 pts","4 items · 10 days · high-value ok"],["Trusted","50+ pts","No caps"]];

  const admin=SESSION.user.role==='admin';

      ${SIGNALS.map(s=>`<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--line);font-size:13px"><span>${s[0]}</span><span class="mono" style="font-weight:600;color:${s[1].charAt(0)==='−'?'var(--bad)':'var(--ok)'}">${s[1]}</span></div>`).join("")}</div>
    <div class="card"><div style="padding:13px 16px;border-bottom:1px solid var(--line)"><b style="font-family:var(--disp)">Clients</b></div>

  </div>`;
};

/* ===================== DEPOSITS ===================== */

VIEWS.deposits=()=>{
  const dep=CACHE.deposits||[];
  const held=dep.reduce((s,d)=>s+Number(d.held||0),0), refunded=dep.reduce((s,d)=>s+Number(d.refunded||0),0), forfeited=dep.reduce((s,d)=>s+Number(d.forfeited||0),0);

async function openDeposit(bookingId){
  $("#drawer").innerHTML='<div class="spin"></div>'; openOverlay($("#drawer"));

}
function depositDrawer(s){
  const evLbl={deposit:["brand","Collected"],deposit_refund:["ok","Refunded"],deposit_forfeit:["bad","Forfeited"]};
  $("#drawer").innerHTML=`<div class="dh"><div><div class="mono muted" style="font-size:12px">${s.booking_number||s.booking_id.slice(0,8)}</div>
    <b style="font-family:var(--disp);font-size:17px">${clientName(s.client_id)} · deposit</b></div><button class="x" onclick="closeOverlays()">✕</button></div>
  <div class="db">
    <div class="split" style="margin-bottom:14px">
      <div class="fact"><div class="k">Agreed</div><div class="v mono">${inr(s.agreed)}</div></div>
      <div class="fact"><div class="k">Held now</div><div class="v mono" style="color:${s.held>0?'var(--brand-ink)':''}">${inr(s.held)}</div></div>
      <div class="fact"><div class="k">Refunded</div><div class="v mono">${inr(s.refunded)}</div></div>
      <div class="fact"><div class="k">Forfeited</div><div class="v mono">${inr(s.forfeited)}</div></div></div>
    ${s.damage_outstanding>0?`<div class="card pad" style="background:var(--bad-wash);border-color:#f1c4c9;margin-bottom:14px"><div style="display:flex;justify-content:space-between;align-items:center;gap:10px"><div><b style="font-size:13px;color:#9b232e">Damage on this booking</b><div class="muted" style="font-size:12px">${inr(s.damage_total)} logged · ${inr(s.damage_outstanding)} not recovered</div></div>${s.held>0?`<button class="btn sm" onclick="depositAction('forfeit','${s.booking_id}',${Math.min(s.held,s.damage_outstanding)},'damage')">Forfeit to cover</button>`:''}</div></div>`:''}
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px">
      <button class="btn" onclick="depositAction('collect','${s.booking_id}',${s.agreed>s.collected?s.agreed-s.collected:0},'')">Collect</button>
      ${s.held>0?`<button class="btn" onclick="depositAction('refund','${s.booking_id}',${s.held},'')">Refund</button>`:''}

function depositAction(kind, bookingId, suggested, reasonHint){
  const titles={collect:'Collect deposit',refund:'Refund deposit',forfeit:'Forfeit deposit'};
  const needMethod=(kind==='collect'||kind==='refund');
  $("#modal").innerHTML=`<div class="dh"><b style="font-family:var(--disp);font-size:17px">${titles[kind]}</b><button class="x" onclick="closeOverlays()">✕</button></div>
  <div class="db">
    <label class="fld"><span>Amount ₹</span><input id="dAmt" class="input mono" inputmode="numeric" value="${suggested||''}"></label>
    ${needMethod?`<label class="fld"><span>Method</span><select id="dMethod" class="input"><option value="upi">UPI</option><option value="cash">Cash</option><option value="neft">NEFT</option><option value="cheque">Cheque</option><option value="razorpay">Razorpay</option><option value="cashfree">Cashfree</option></select></label>`:''}
    ${kind==='forfeit'?`<label class="fld"><span>Reason</span><input id="dReason" class="input" value="${reasonHint==='damage'?'damage cover':''}" placeholder="why"></label>`:''}
    <label class="fld"><span>Notes</span><input id="dNotes" class="input" placeholder="optional"></label>
    <button class="btn pri block" id="dBtn" onclick="submitDeposit('${kind}','${bookingId}')">${titles[kind]}</button>
  </div>`;
  openOverlay($("#modal"));
}
async function submitDeposit(kind, bookingId){
  const amt=Number(($("#dAmt")||{}).value||0);
  if(!amt||amt<=0){ toast('Enter an amount',true); return; }
  const btn=$("#dBtn"); btn.disabled=true; btn.textContent='Working…';
  const payload={booking_id:bookingId, amount:amt, notes:($("#dNotes")||{}).value||''};
  if($("#dMethod"))payload.method=$("#dMethod").value;
  if($("#dReason"))payload.reason=$("#dReason").value;
  const action={collect:'deposit_collect',refund:'deposit_refund',forfeit:'deposit_forfeit'}[kind];
  try{ await api(action,payload); toast('Deposit updated'); closeOverlays(); await reloadData(); openDeposit(bookingId); }
  catch(e){ toast(e.message,true); btn.disabled=false; btn.textContent=titles_(kind); }
}
function titles_(k){return {collect:'Collect deposit',refund:'Refund deposit',forfeit:'Forfeit deposit'}[k]||'Submit';}

    </div>`:'<div class="chip pend" style="width:100%;justify-content:center;padding:9px;margin-bottom:16px">Retired asset</div>'}
    <p style="font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-4);margin:0 0 6px">Service history</p>
    ${a.history.length?a.history.slice().reverse().map(h=>`<div style="padding:8px 0;border-bottom:1px solid var(--line)"><div style="display:flex;justify-content:space-between"><b style="font-size:13px">${h.category}${h.description?' · '+h.description:''}</b><span class="mono">${inr(h.cost)}</span></div><div class="muted" style="font-size:11px">${h.performed_at?fmtDate(h.performed_at):''}${h.vendor?' · '+h.vendor:''}${h.next_due_at?' · next '+fmtDate(h.next_due_at):''}</div></div>`).join(""):'<div class="muted" style="font-size:12px">No service logged yet.</div>'}
  </div>`;
  openOverlay($("#drawer"));
}
function serviceModal(assetId){
  $("#modal").innerHTML=`<div class="dh"><b style="font-family:var(--disp);font-size:17px">Log service</b><button class="x" onclick="closeOverlays()">✕</button></div>
  <div class="db">
    <div style="display:flex;gap:10px">
      <label class="fld" style="flex:1"><span>Category</span><select id="mCat" class="input"><option value="electronic">Electronic</option><option value="optical">Optical</option><option value="hardware">Hardware</option><option value="software">Software</option><option value="cosmetic">Cosmetic</option></select></label>
      <label class="fld" style="flex:1"><span>Condition after</span><select id="mCond" class="input"><option value="good">Good</option><option value="minor">Minor</option><option value="major">Major</option></select></label></div>
    <label class="fld"><span>Description</span><input id="mDesc" class="input" placeholder="what was done"></label>
    <div style="display:flex;gap:10px">
      <label class="fld" style="flex:1"><span>Cost ₹</span><input id="mCost" class="input mono" inputmode="numeric" placeholder="0"></label>
      <label class="fld" style="flex:1"><span>Vendor</span><input id="mVendor" class="input" placeholder="optional"></label></div>
    <label class="fld"><span>Next due (optional)</span><input id="mNext" class="input" type="date"></label>
    <button class="btn pri block" id="mBtn" onclick="submitService('${assetId}')">Save & reset cycle</button>
  </div>`;
  openOverlay($("#modal"));
}
async function submitService(assetId){
  const btn=$("#mBtn"); btn.disabled=true; btn.textContent='Saving…';
  try{ await api('maintenance_service',{asset_id:assetId, category:$("#mCat").value, condition:$("#mCond").value,
      description:($("#mDesc")||{}).value||'', cost:Number(($("#mCost")||{}).value||0), vendor:($("#mVendor")||{}).value||'',
      next_due_at:($("#mNext")||{}).value||'', triggered_by:'manual'});
    toast('Service logged · cycle reset'); closeOverlays(); await reloadData(); openAsset(assetId);
  }catch(e){ toast(e.message,true); btn.disabled=false; btn.textContent='Save & reset cycle'; }
}
async function holdToggle(assetId,on){
  try{ await api('maintenance_hold',{asset_id:assetId, on:on}); toast(on?'Held out of service':'Back in service'); await reloadData(); openAsset(assetId);}catch(e){toast(e.message,true);}
}
async function doRetire(assetId){
  const reason=prompt('Retire this asset — reason?'); if(reason===null)return;
  try{ await api('asset_retire',{asset_id:assetId, reason:reason}); toast('Asset retired'); await reloadData(); openAsset(assetId);}catch(e){toast(e.message,true);}
}

function openOverlay(el){ $("#bg").classList.add("show"); el.classList.add("show"); }
function closeOverlays(){ $("#bg").classList.remove("show"); $("#drawer").classList.remove("show"); $("#modal").classList.remove("show"); }

async function openBooking(id){
  $("#drawer").innerHTML='<div class="spin"></div>'; openOverlay($("#drawer"));
  try{
    const b = await api('booking', {booking_id:id});
    const items=b.items||[];
    const sm={pending_dispatch:["pend","Pending dispatch"],dispatched:["brand","With client"],returned:["ok","Returned"],
      returned_with_damage:["warn","Returned · damage"],not_returned_chargeable:["bad","Not returned · charged"],
      not_returned_non_chargeable:["pend","Not returned · ₹0"],missing:["bad","Missing"]};
    $("#drawer").innerHTML=`<div class="dh"><div><div class="mono muted" style="font-size:12px">${b.booking_number||b.id.slice(0,8)}</div>
      <b style="font-family:var(--disp);font-size:17px">${clientName(b.client_id)}</b> ${tier(b.tier_at_booking)}</div>
      <button class="x" onclick="closeOverlays()">✕</button></div>
    <div class="db">
      <div class="split" style="margin-bottom:16px">
        <div class="fact"><div class="k">Stage</div><div class="v" style="font-size:13px">${stageChip(b.status)}</div></div>
        <div class="fact"><div class="k">Dates</div><div class="v" style="font-size:13px">${fmtDate(b.start_date)}–${fmtDate(b.end_date)}</div></div>
        <div class="fact"><div class="k">Estimate</div><div class="v mono">${inr(b.total_estimated)}</div></div></div>
      <div class="split" style="margin-bottom:16px">
        <div class="fact"><div class="k">Subtotal</div><div class="v mono">${inr(b.subtotal)}</div></div>
        <div class="fact"><div class="k">Discount</div><div class="v mono">${inr(b.discount_amount)}</div></div>
        <div class="fact"><div class="k">GST</div><div class="v mono">${inr(b.gst_amount)}</div></div></div>
      <p style="font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-4);margin:0 0 8px">Items (${items.length})</p>
      <div class="card">${items.map(it=>{const a=sm[it.status]||["pend",it.status];
        return `<div style="display:flex;justify-content:space-between;align-items:center;padding:11px 14px;border-bottom:1px solid var(--line)"><span>${assetName(it.asset_id)}</span><span class="chip ${a[0]}">${a[1]}</span></div>`;}).join("")}</div>
      ${b.status==='quote'?`<button class="btn pri block" style="margin-top:16px" onclick="confirmBooking('${b.id}')">Confirm booking</button>`:''}
      ${b.status==='confirmed'?`<button class="btn pri block" style="margin-top:16px" onclick="closeOverlays();startDispatch('${b.id}')">Dispatch this booking</button>`:''}
      ${(b.status==='dispatched'||b.status==='open')?`<button class="btn pri block" style="margin-top:16px" onclick="closeOverlays();startReturn('${b.id}')">Receive returns</button>`:''}
      ${['dispatched','open','finalised','tax_invoice','paid','closed'].indexOf(b.status)>=0?`<button class="btn block" style="margin-top:8px" onclick="closeOverlays();openInvoiceForBooking('${b.id}')">View invoice</button>`:''}
      ${['confirmed','dispatched','open','finalised','tax_invoice','paid','closed'].indexOf(b.status)>=0?`<button class="btn block" style="margin-top:8px" onclick="closeOverlays();openDeposit('${b.id}')">Manage deposit</button>`:''}
    </div>`;
  }catch(e){ $("#drawer").innerHTML=`<div class="db"><button class="x" onclick="closeOverlays()">✕</button><div class="empty">${e.message}</div></div>`; }
}
async function confirmBooking(id){
  try{ const r=await api('confirm_booking',{booking_id:id, deposit_amount:0});
    toast('Booking confirmed · '+(r.advance_note||'')); closeOverlays(); await reloadData(); }
  catch(e){ toast(e.message, true); }
}
function openAsset(id){
  const a=CACHE.assets.find(x=>x.id===id); if(!a)return;
  $("#drawer").innerHTML=`<div class="dh"><div><div class="mono muted" style="font-size:12px">${a.qr_code||'—'}</div>
    <b style="font-family:var(--disp);font-size:17px">${a.name}</b></div><button class="x" onclick="closeOverlays()">✕</button></div>
  <div class="db"><div class="split">
    <div class="fact"><div class="k">Rate/day</div><div class="v mono">${inr(a.daily_rate)}</div></div>
    <div class="fact"><div class="k">Purchase</div><div class="v mono">${inr(a.purchase_price)}</div></div>
    <div class="fact"><div class="k">Owner</div><div class="v" style="font-size:13px">${a.owner_type==='investor'?'Investor':'Business'}</div></div>
    <div class="fact"><div class="k">Condition</div><div class="v" style="font-size:13px">${a.condition_status||'—'}</div></div>
    <div class="fact"><div class="k">Total rentals</div><div class="v mono">${a.total_rentals||0}</div></div>
    <div class="fact"><div class="k">Status</div><div class="v" style="font-size:13px">${truthy(a.is_available)?'Available':'On rent'}</div></div>
  </div></div>`;
  openOverlay($("#drawer"));
}

let pick={client:'', assets:[]};
function newQuote(){
  pick={client:'', assets:[]};
  const today=new Date().toISOString().slice(0,10);
  const end=new Date(Date.now()+86400000).toISOString().slice(0,10);
  const avail=CACHE.assets.filter(a=>truthy(a.is_available));
  $("#modal").innerHTML=`<div class="dh"><b style="font-family:var(--disp);font-size:17px">New quote</b><button class="x" onclick="closeOverlays()">✕</button></div>
  <div class="db">
    <label class="fld"><span>Client</span><select id="qClient" class="input" onchange="pick.client=this.value">
      <option value="">Select client…</option>${CACHE.clients.map(c=>`<option value="${c.id}">${c.name}${truthy(c.is_blacklisted)?' (blacklisted)':''}</option>`).join("")}</select></label>
    <div style="display:flex;gap:10px"><label class="fld" style="flex:1"><span>Start</span><input id="qStart" class="input" type="date" value="${today}"></label>
      <label class="fld" style="flex:1"><span>End</span><input id="qEnd" class="input" type="date" value="${end}"></label></div>
    <span style="font-size:12px;font-weight:600;color:var(--ink-2);display:block;margin-bottom:7px">Assets ${avail.length?'':'— none available'}</span>
    <div style="max-height:230px;overflow:auto">${avail.map(a=>`<label class="pickrow" id="pk-${a.id}">
      <input type="checkbox" onchange="togglePick('${a.id}',this.checked)"><div style="flex:1"><b style="font-size:13px">${a.name}</b>
      <div class="muted mono" style="font-size:11.5px">${a.qr_code||''} · ${inr(a.daily_rate)}/day</div></div></label>`).join("")||'<div class="empty">No available assets</div>'}</div>
    <button class="btn pri block" style="margin-top:16px" id="qBtn" onclick="submitQuote()">Create quote</button>
  </div>`;
  openOverlay($("#modal"));
}
function togglePick(id,on){ pick.assets=pick.assets.filter(x=>x!==id); if(on)pick.assets.push(id); const el=$("#pk-"+id); if(el)el.classList.toggle("on",on); }
async function submitQuote(){
  if(!pick.client){ toast('Pick a client', true); return; }
  if(!pick.assets.length){ toast('Pick at least one asset', true); return; }
  const btn=$("#qBtn"); btn.disabled=true; btn.textContent="Creating…";
  try{
    const r=await api('create_quote', {client_id:pick.client, asset_ids:pick.assets,
      start_date:$("#qStart").value, end_date:$("#qEnd").value});
    toast('Quote '+r.booking_number+' created · '+inr(r.total)); closeOverlays();
    await reloadData(); openBooking(r.booking_id);
  }catch(e){ toast(e.message, true); btn.disabled=false; btn.textContent="Create quote"; }
}

boot();
</script>
</body>
</html>
