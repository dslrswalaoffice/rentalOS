<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RentalOS — Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;450;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#16181d;--ink-2:#3c4150;--ink-3:#6b7280;--ink-4:#9aa1ad;
  --surface:#fff;--panel:#f6f7f9;--panel-2:#eef0f4;--line:#e3e6ec;--line-2:#d3d7e0;
  --brand:#2d44c7;--brand-ink:#1d2f96;--brand-wash:#eef1ff;
  --ok:#1f9d57;--ok-wash:#e7f6ed;--warn:#b9791b;--warn-wash:#fbf1df;
  --bad:#cc3340;--bad-wash:#fbe9eb;--pend:#7a8294;--pend-wash:#eef0f4;
  --purple:#7c3aed;--purple-wash:#f3e8ff;--view:#0e1320;
  --r:10px;--r-lg:14px;--sh:0 1px 2px rgba(16,18,29,.05),0 1px 1px rgba(16,18,29,.04);
  --sh-lg:0 8px 30px rgba(16,18,29,.10);
  --font:"Inter",system-ui,sans-serif;--disp:"Space Grotesk",sans-serif;--mono:"JetBrains Mono",monospace;
}
*{box-sizing:border-box}html,body{margin:0;padding:0}
body{font-family:var(--font);color:var(--ink);background:var(--panel);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer}a{color:inherit}::selection{background:var(--brand-wash)}

.appbar{position:sticky;top:0;z-index:40;display:flex;align-items:center;gap:18px;height:58px;padding:0 20px;background:var(--surface);border-bottom:1px solid var(--line)}
.brand{display:flex;align-items:center;gap:10px;font-family:var(--disp);font-weight:700;font-size:16px;letter-spacing:-.01em}
.logo{position:relative;width:26px;height:26px;flex:none}
.logo::before,.logo::after{content:"";position:absolute;width:8px;height:8px;border:2px solid var(--brand)}
.logo::before{top:0;left:0;border-right:0;border-bottom:0}.logo::after{bottom:0;right:0;border-left:0;border-top:0}
.logo i{position:absolute;inset:7px;border-radius:50%;background:var(--brand);display:block}
.brand small{font-family:var(--font);font-weight:500;font-size:11px;color:var(--ink-4)}
.appbar .spacer{flex:1}
.search{display:flex;align-items:center;gap:8px;background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:7px 11px;color:var(--ink-4);width:240px;max-width:26vw}
.search input{border:0;background:transparent;outline:none;font-family:inherit;font-size:13px;color:var(--ink);width:100%}
.roleswitch{display:flex;background:var(--panel);border:1px solid var(--line);border-radius:9px;padding:3px}
.roleswitch button{border:0;background:transparent;color:var(--ink-3);font-size:12.5px;font-weight:500;padding:6px 12px;border-radius:6px;transition:.12s}
.roleswitch button.on{background:var(--surface);color:var(--brand-ink);box-shadow:var(--sh);font-weight:600}
.who{display:flex;align-items:center;gap:9px}
.avatar{width:30px;height:30px;border-radius:50%;background:var(--brand);color:#fff;display:grid;place-items:center;font-weight:600;font-size:12px}
.who b{font-size:13px;font-weight:600;display:block;line-height:1.1}.who span{font-size:11px;color:var(--ink-4)}

.layout{display:flex;min-height:calc(100vh - 58px)}
.side{width:222px;flex:none;background:var(--surface);border-right:1px solid var(--line);padding:12px 12px;position:sticky;top:58px;height:calc(100vh - 58px);overflow:auto}
.side .grp{font-size:10.5px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--ink-4);padding:13px 10px 5px}
.nav{border:0;background:transparent;width:100%;text-align:left;display:flex;align-items:center;gap:10px;padding:7px 10px;border-radius:8px;color:var(--ink-2);font-size:13px;font-weight:500;transition:.1s;margin-bottom:1px}
.nav:hover{background:var(--panel)}.nav.on{background:var(--brand-wash);color:var(--brand-ink);font-weight:600}
.nav svg{flex:none}.nav .tag{margin-left:auto;font-size:10px;font-weight:600;color:#fff;background:var(--bad);border-radius:20px;padding:1px 7px}
.main{flex:1;min-width:0;padding:24px 28px 60px}

.ribbon{background:var(--warn-wash);border:1px solid #efdcb6;color:#8a5d12;font-size:12px;font-weight:500;padding:7px 14px;border-radius:8px;margin-bottom:20px;display:flex;gap:8px;align-items:center}
.h1{font-family:var(--disp);font-size:22px;font-weight:600;letter-spacing:-.015em;margin:0}
.sub{color:var(--ink-3);font-size:13.5px;margin:3px 0 0}
.head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:20px;flex-wrap:wrap}
.btn{border:1px solid var(--line-2);background:var(--surface);color:var(--ink);border-radius:8px;padding:8px 14px;font-size:13px;font-weight:550;display:inline-flex;align-items:center;gap:7px;transition:.12s}
.btn:hover{background:var(--panel)}.btn.pri{background:var(--brand);border-color:var(--brand);color:#fff}.btn.pri:hover{background:var(--brand-ink)}
.btn.sm{padding:6px 11px;font-size:12px}.btn:disabled{opacity:.5;cursor:not-allowed}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);box-shadow:var(--sh)}.card.pad{padding:18px}
.grid{display:grid;gap:16px}.mono{font-family:var(--mono);font-feature-settings:"tnum"}.muted{color:var(--ink-3)}
.sectionlabel{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-4);margin:0 0 10px}

.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.kpi{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);padding:16px 18px;box-shadow:var(--sh)}
.kpi .lbl{font-size:12px;color:var(--ink-3);font-weight:500}
.kpi .val{font-family:var(--disp);font-size:26px;font-weight:600;letter-spacing:-.02em;margin-top:8px}
.kpi .val small{font-family:var(--mono);font-size:13px;color:var(--ink-4);font-weight:500}
.kpi .delta{font-size:11.5px;font-weight:600;margin-top:5px}
.delta.up{color:var(--ok)}.delta.down{color:var(--bad)}.delta.flat{color:var(--ink-4)}

table.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{text-align:left;font-weight:600;font-size:11px;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-4);padding:10px 14px;border-bottom:1px solid var(--line)}
.tbl td{padding:12px 14px;border-bottom:1px solid var(--line)}.tbl tr:last-child td{border-bottom:0}
.tbl tbody tr{transition:.08s}.tbl tbody tr:hover{background:var(--panel)}.tbl .clickable{cursor:pointer}

.chip{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:600;padding:3px 9px;border-radius:20px;white-space:nowrap}
.chip::before{content:"";width:6px;height:6px;border-radius:50%;background:currentColor;opacity:.9}
.chip.ok{color:var(--ok);background:var(--ok-wash)}.chip.warn{color:var(--warn);background:var(--warn-wash)}
.chip.bad{color:var(--bad);background:var(--bad-wash)}.chip.pend{color:var(--pend);background:var(--pend-wash)}
.chip.brand{color:var(--brand-ink);background:var(--brand-wash)}.chip.purple{color:var(--purple);background:var(--purple-wash)}
.chip.plain::before{display:none}
.tierbadge{font-size:11px;font-weight:700;letter-spacing:.03em;padding:3px 9px;border-radius:6px}
.tier-vip{background:#f3e8ff;color:#6b21a8}.tier-premium{background:#fff4e0;color:#92600c}.tier-normal{background:var(--panel-2);color:var(--ink-2)}

.steps{display:flex;align-items:center;gap:0;flex-wrap:wrap;margin:4px 0}
.step{display:flex;align-items:center;gap:8px;font-size:12px}
.step .dot{width:22px;height:22px;border-radius:50%;border:2px solid var(--line-2);background:var(--surface);display:grid;place-items:center;font-size:11px;font-weight:700;color:var(--ink-4)}
.step.done .dot{background:var(--ok);border-color:var(--ok);color:#fff}
.step.now .dot{background:var(--brand);border-color:var(--brand);color:#fff;box-shadow:0 0 0 4px var(--brand-wash)}
.step .nm{font-weight:550;color:var(--ink-3)}.step.done .nm,.step.now .nm{color:var(--ink)}
.step .bar{width:30px;height:2px;background:var(--line-2);margin:0 4px}.step.done .bar{background:var(--ok)}

.bar-track{height:8px;background:var(--panel-2);border-radius:20px;overflow:hidden}.bar-fill{height:100%;border-radius:20px;background:var(--brand)}
.gauge{--p:0;width:120px;height:120px;border-radius:50%;background:conic-gradient(var(--brand) calc(var(--p)*1%),var(--panel-2) 0);display:grid;place-items:center;position:relative;flex:none}
.gauge::after{content:"";position:absolute;inset:12px;background:var(--surface);border-radius:50%}.gauge b{position:relative;font-family:var(--disp);font-size:26px;font-weight:600}

.tl{list-style:none;margin:0;padding:0;position:relative}
.tl::before{content:"";position:absolute;left:7px;top:6px;bottom:6px;width:2px;background:var(--line)}
.tl li{position:relative;padding:0 0 16px 28px}
.tl li::before{content:"";position:absolute;left:2px;top:4px;width:12px;height:12px;border-radius:50%;background:var(--surface);border:2px solid var(--brand)}
.tl li.muted::before{border-color:var(--line-2)}.tl .t{font-size:11px;color:var(--ink-4);font-family:var(--mono)}.tl .m{font-size:13px;margin-top:1px}

.scanwrap{display:grid;grid-template-columns:minmax(0,1fr) 360px;gap:20px}
.viewer{position:relative;background:var(--view);border-radius:var(--r-lg);overflow:hidden;aspect-ratio:4/3;display:grid;place-items:center}
.viewer .feed{position:absolute;inset:0;background:radial-gradient(120% 90% at 50% 40%,#1b2436 0%,#0c111c 70%);opacity:.9}
.frame{position:relative;width:60%;aspect-ratio:1}
.frame span{position:absolute;width:26px;height:26px;border:3px solid rgba(255,255,255,.85)}
.frame span:nth-child(1){top:0;left:0;border-right:0;border-bottom:0}.frame span:nth-child(2){top:0;right:0;border-left:0;border-bottom:0}
.frame span:nth-child(3){bottom:0;left:0;border-right:0;border-top:0}.frame span:nth-child(4){bottom:0;right:0;border-left:0;border-top:0}
.scanline{position:absolute;left:8%;right:8%;height:2px;background:linear-gradient(90deg,transparent,#5cf2a6,transparent);box-shadow:0 0 12px #5cf2a6;animation:scan 2.4s ease-in-out infinite}
@keyframes scan{0%,100%{top:14%}50%{top:84%}}
.viewer .hint{position:absolute;bottom:12px;left:0;right:0;text-align:center;color:rgba(255,255,255,.6);font-size:11.5px;font-family:var(--mono)}
.scanmsg{position:absolute;top:12px;left:12px;right:12px;border-radius:8px;padding:9px 12px;font-size:12.5px;font-weight:600;display:none;align-items:center;gap:8px}
.scanmsg.show{display:flex}.scanmsg.good{background:rgba(31,157,87,.92);color:#fff}.scanmsg.err{background:rgba(204,51,64,.94);color:#fff}
.checklist{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);box-shadow:var(--sh);overflow:hidden}
.checklist .ch-h{padding:14px 16px;border-bottom:1px solid var(--line)}
.grouplbl{font-size:10px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-4);padding:11px 16px 4px;background:var(--panel)}
.slot{display:flex;align-items:center;gap:11px;padding:10px 16px;border-bottom:1px solid var(--line)}.slot:last-child{border-bottom:0}
.slot .box{width:22px;height:22px;border-radius:6px;border:2px solid var(--line-2);flex:none;display:grid;place-items:center;color:#fff;font-size:13px;transition:.15s}
.slot.done .box{background:var(--ok);border-color:var(--ok)}.slot.off{opacity:.45}
.slot .nm{font-weight:550;font-size:13px}.slot .qty{margin-left:auto;font-family:var(--mono);font-size:12px;color:var(--ink-3)}.slot.done .qty{color:var(--ok);font-weight:600}
.mini{border:1px solid var(--line-2);background:var(--surface);border-radius:6px;font-size:11px;padding:3px 8px;margin-left:auto}
.scanbtns{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px}.scanbtns .btn{padding:7px 11px;font-size:12px}

.seg{display:inline-flex;background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:2px;gap:2px;flex-wrap:wrap}
.seg button{border:0;background:transparent;font-size:12px;font-weight:550;color:var(--ink-3);padding:5px 10px;border-radius:6px}
.seg button.on{background:var(--surface);box-shadow:var(--sh);color:var(--ink)}
.seg button.on[data-sev="bad"]{color:var(--bad)}.seg button.on[data-sev="warn"]{color:var(--warn)}.seg button.on[data-sev="ok"]{color:var(--ok)}
.toggle{width:38px;height:22px;border-radius:20px;background:var(--line-2);position:relative;border:0;flex:none;transition:.15s}
.toggle::after{content:"";position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:#fff;transition:.15s;box-shadow:var(--sh)}
.toggle.on{background:var(--brand)}.toggle.on::after{left:18px}
.chk{display:inline-flex;align-items:center;gap:6px;font-size:12px;border:1px solid var(--line-2);border-radius:20px;padding:4px 10px;color:var(--ink-2)}
.chk.on{background:var(--brand-wash);border-color:var(--brand);color:var(--brand-ink);font-weight:600}
.input{border:1px solid var(--line-2);border-radius:8px;padding:8px 11px;font-family:inherit;font-size:13px;width:100%;outline:none}
.input:focus{border-color:var(--brand)}
.photo{width:54px;height:54px;border-radius:8px;border:1px dashed var(--line-2);display:grid;place-items:center;color:var(--ink-4);font-size:11px;background:var(--panel)}

.drawer-bg{position:fixed;inset:0;background:rgba(16,18,29,.4);z-index:60;display:none}.drawer-bg.show{display:block}
.drawer{position:fixed;top:0;right:0;bottom:0;width:540px;max-width:94vw;background:var(--surface);z-index:61;transform:translateX(100%);transition:.22s cubic-bezier(.4,0,.2,1);overflow:auto;box-shadow:var(--sh-lg)}
.drawer.show{transform:none}
.drawer .dh{position:sticky;top:0;background:var(--surface);border-bottom:1px solid var(--line);padding:18px 22px;display:flex;align-items:flex-start;justify-content:space-between;gap:12px;z-index:1}
.drawer .db{padding:20px 22px}
.x{border:0;background:var(--panel);width:30px;height:30px;border-radius:8px;color:var(--ink-3);font-size:16px}.x:hover{background:var(--panel-2)}

.split{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px}
.fact{background:var(--panel);border-radius:10px;padding:12px 14px}.fact .k{font-size:11px;color:var(--ink-4);font-weight:500}
.fact .v{font-family:var(--disp);font-size:17px;font-weight:600;margin-top:3px}.fact .v.mono{font-family:var(--mono);font-size:15px}
.cols{display:grid;grid-template-columns:2fr 1fr;gap:16px}
.cols3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.barchart{display:flex;align-items:flex-end;gap:8px;height:140px;padding-top:10px}
.barchart .col{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;height:100%;justify-content:flex-end}
.barchart .col .b{width:100%;max-width:34px;background:var(--brand);border-radius:5px 5px 0 0}.barchart .col .b.alt{background:var(--brand-wash);border:1px solid var(--line-2)}
.barchart .col small{font-size:10.5px;color:var(--ink-4);font-family:var(--mono)}
.catcard{border:1px solid var(--line);border-radius:12px;padding:16px;cursor:pointer;transition:.12s}
.catcard:hover{border-color:var(--line-2);background:var(--panel)}.catcard.on{border-color:var(--brand);background:var(--brand-wash)}
.catcard b{font-family:var(--disp);font-size:15px}.catcard p{margin:6px 0 0;font-size:12px;color:var(--ink-3)}
.flagrow{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--line)}.flagrow:last-child{border-bottom:0}
.empty{text-align:center;padding:50px 20px;color:var(--ink-4)}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;font-size:13px;font-weight:500;padding:11px 18px;border-radius:10px;box-shadow:var(--sh-lg);opacity:0;transition:.2s;z-index:80;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media(max-width:1000px){.cols,.cols3{grid-template-columns:1fr}.kpis{grid-template-columns:repeat(2,1fr)}.scanwrap{grid-template-columns:1fr}}
@media(max-width:680px){.kpis{grid-template-columns:1fr}.side{display:none}.main{padding:18px 16px 50px}}
</style>
</head>

/* ============================ SCAN LOGIC ============================ */
let scanned={};
function requiredSlots(){const r=KIT.mandatory.slice();KIT.optInc.forEach(k=>{if(k.included)r.push(k);});KIT.optExc.forEach(k=>{if(k.added)r.push(k);});return r;}
function renderSlots(){
  const req=requiredSlots();
  const total=req.reduce((s,k)=>s+k.need,0);
  const got=req.reduce((s,k)=>s+Math.min(scanned[k.type]||0,k.need),0);
  let h=`<div class="grouplbl">Mandatory</div>`+KIT.mandatory.map(slotHTML).join("");
  h+=`<div class="grouplbl">Optional · included (can opt out)</div>`+KIT.optInc.map(k=>slotHTML(k,!k.included,`<button class="mini" onclick="toggleOptInc('${k.type}')">${k.included?'Opt out':'Include'}</button>`)).join("");
  h+=`<div class="grouplbl">Optional · excluded (can add)</div>`+KIT.optExc.map(k=>slotHTML(k,!k.added,`<button class="mini" onclick="toggleOptExc('${k.type}')">${k.added?'Remove':'Add'}</button>`)).join("");
  $("#slots").innerHTML=h;
  $("#kitstatus").textContent=`${got} of ${total} required scanned`;
  $("#otpbtn").disabled=got<total;
}
function slotHTML(k,off,extra){const n=Math.min(scanned[k.type]||0,k.need),done=!off&&n>=k.need;
  return `<div class="slot ${done?'done':''} ${off?'off':''}"><div class="box">${done?'✓':''}</div><div class="nm">${k.nm}</div>${extra?'':`<div class="qty">${n}/${k.need}</div>`}${extra||''}</div>`;}
function toggleOptInc(t){const k=KIT.optInc.find(x=>x.type===t);k.included=!k.included;renderSlots();}
function toggleOptExc(t){const k=KIT.optExc.find(x=>x.type===t);k.added=!k.added;renderSlots();}
function flash(type,msg){const el=$("#scanmsg");el.className="scanmsg show "+type;el.innerHTML=msg;clearTimeout(window._ft);window._ft=setTimeout(()=>el.classList.remove("show"),2200);}
function scanItem(type){const all=KIT.mandatory.concat(KIT.optInc,KIT.optExc);const k=all.find(x=>x.type===type);if(!k)return;
  scanned[type]=(scanned[type]||0)+1;
  if(scanned[type]<=k.need)flash("good",`✓ ${k.nm} — ${Math.min(scanned[type],k.need)}/${k.need}`);
  else{scanned[type]=k.need;flash("err",`Already have ${k.need}× ${k.nm} — extra ignored`);}
  renderSlots();}
function scanWrong(){flash("err","Nikon EN-EL15 scanned — this kit requires Sony NP-FZ100 ×3");}
function resetScan(){scanned={};renderSlots();}

      <div id="dmg-${i}" style="display:none;margin-top:12px">

function setCond(i,j,el){el.parentNode.querySelectorAll("button").forEach(b=>b.classList.remove("on"));el.classList.add("on");
  $("#dmg-"+i).style.display=j>=2?"block":"none";}

function afterRender(){if(VIEW==="scan")renderSlots();if(VIEW==="returns")renderReturns();}

document.querySelectorAll("#roleswitch button").forEach(b=>b.onclick=()=>setRole(b.dataset.role));
